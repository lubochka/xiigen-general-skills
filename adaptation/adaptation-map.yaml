entries:
  - id: universal.evidence-before-final
    layer: universal
    artifact_type: skill
    source_family: [self-verification, claim-verification]
    portability: extract
    purpose: Require evidence before completion claims.
    applies_when: Any task where an agent reports completion.
    parameters_required: [accepted_evidence_types, verification_commands_from_target_profile]
    workflow_stage: [select, parameterize, render, validate]
    render:
      required:
        neutral: skills/universal/evidence-before-final/SKILL.md
      optional:
        cursor: .cursor/rules/01-evidence-before-final.mdc
        claude: .claude/skills/evidence-before-final/SKILL.md
        codex: .agents/skills/evidence-before-final/SKILL.md
    activation: { cursor: always, claude: explicit_skill, codex: explicit_skill }
    dependencies: [universal.executor-cannot-self-finish]
    conflicts: []
    quality_gates: [map_schema_valid, evidence_is_not_approval, commands_must_be_profile_parameters]
    status: ready
    notes: Stack/runtime evidence belongs in stack entries.

  - id: architecture.trainable-architecture
    layer: architecture
    artifact_type: template
    source_family: [architecture-concepts, trainable-decision-skills]
    portability: parameterize
    purpose: Adapt trainable architecture concepts without copying private implementation.
    applies_when: Target project has trainable units, feedback loops, model artifacts, or adaptive prompts.
    parameters_required: [domain, trainable_unit_type, feedback_source, lifecycle_states, promotion_gates]
    workflow_stage: [select, parameterize, render, validate]
    render:
      required:
        neutral: guides/architecture/trainable-architecture-template.md
      optional: {}
    activation: { cursor: manual, claude: explicit_skill, codex: explicit_skill }
    dependencies: [universal.assumption-registry, universal.decision-capture]
    conflicts: []
    quality_gates: [no_xiigen_only_terms_as_requirements, no_raw_training_artifacts]
    status: ready
    notes: Template asks questions; it does not prescribe ML stack.

  - id: stack.dotnet-csharp
    layer: stack
    artifact_type: guide
    source_family: [dotnet-plans, build-config, test-rules]
    portability: parameterize
    purpose: Create a target-project .NET/C# skill without copying commands.
    applies_when: Target project uses .NET, C#, solution files, or C# tests.
    parameters_required: [dotnet_version, solution_files, project_layout, build_commands, test_commands, namespace_rules, forbidden_commands]
    workflow_stage: [select, parameterize, render, validate]
    render:
      required:
        neutral: guides/stack-skill-factories/create-dotnet-csharp-skill.md
      optional: {}
    activation: { cursor: manual, claude: explicit_skill, codex: explicit_skill }
    dependencies: [universal.code-request-safety, universal.code-execution, universal.failure-triage]
    conflicts: []
    quality_gates: [commands_from_target_project_only, no_stack_commands_in_universal]
    status: ready
    notes: Commands come from target project profile or CI only.

  - id: stack.command-gate
    layer: stack
    artifact_type: guide
    source_family: [local-agent-settings, command-scripts, command-tools]
    portability: parameterize
    purpose: Create a target-project command safety gate.
    applies_when: Target project needs safe/approval-required/forbidden command categories.
    parameters_required: [safe_commands, approval_required_commands, forbidden_commands, destructive_patterns, local_policy_source]
    workflow_stage: [select, parameterize, render, validate]
    render:
      required:
        neutral: guides/stack-skill-factories/create-command-gate-skill.md
      optional: {}
    activation: { cursor: manual, claude: explicit_skill, codex: explicit_skill }
    dependencies: [universal.code-request-safety, universal.code-execution]
    conflicts: []
    quality_gates: [commands_from_target_project_only, no_private_settings_published]
    status: ready
    notes: Local settings files are source material only.

  - id: other.generated-docs-policy
    layer: other
    artifact_type: policy
    source_family: [generated-wiki-domain, generated-output-artifacts]
    portability: reference_only
    purpose: Classify generated docs and raw artifacts as source material.
    applies_when: Source includes generated docs, reports, evidence, or artifacts.
    parameters_required: [generated_paths, canonical_docs, sanitizer_policy]
    workflow_stage: [select, parameterize, render, validate]
    render:
      required:
        neutral: guides/other-policies/generated-docs-policy.md
      optional: {}
    activation: { cursor: manual, claude: manual, codex: manual }
    dependencies: [universal.no-secrets]
    conflicts: []
    quality_gates: [raw_generated_material_not_published, private_paths_removed]
    status: ready
    notes: Generated material is not reusable guidance by default.

