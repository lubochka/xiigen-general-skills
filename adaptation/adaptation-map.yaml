schema_version: 1
map_id: xiigen-general-skills-adaptation
canonical_version: 0.1.0-oss-rc1
project_profile_ref: project-profile.yaml

tool_targets:
  cursor:
    rule_dir: .cursor/rules
    instruction_file: AGENTS.md
  claude:
    instruction_file: CLAUDE.md
    skills_dir: .claude/skills
  codex:
    instruction_file: AGENTS.md
    skills_dir: .agents/skills

required_entry_fields:
  - id
  - layer
  - artifact_type
  - source_family
  - portability
  - purpose
  - applies_when
  - parameters_required
  - workflow_stage
  - render
  - activation
  - dependencies
  - conflicts
  - quality_gates
  - status
  - notes

common_quality_gates:
  - map_schema_valid
  - no_unresolved_placeholders
  - no_private_paths
  - no_secrets
  - skipped_entries_explained
  - adapter_semantic_drift_check

activation_mode_schema:
  always:
    cursor: "Render as `.mdc` rule with always-apply behavior or repository `AGENTS.md` startup section."
    claude: "Render into `CLAUDE.md` or always-loaded project guidance."
    codex: "Render into `AGENTS.md` startup guidance."
  explicit_skill:
    cursor: "Render as `.mdc` rule with description; user/agent invokes when task matches."
    claude: "Render as `.claude/skills/<skill-name>/SKILL.md`."
    codex: "Render as `.agents/skills/<skill-name>/SKILL.md`."
  path_scoped:
    cursor: "Render as `.mdc` rule with globs."
    claude: "Render as skill plus path note in `CLAUDE.md`."
    codex: "Render as skill plus path note in `AGENTS.md`."
  manual:
    cursor: "Render as documentation or manual rule reference."
    claude: "Render as manual guide or explicit skill."
    codex: "Render as manual guide or explicit skill."

quality_gate_definitions:
  map_schema_valid:
    severity: blocker
    pass: required map sections and executable entries are present
    evidence: scripts/validate-map.ps1 output
  no_unresolved_placeholders:
    severity: blocker
    pass: ready entries and rendered outputs have no unresolved placeholders
    evidence: adaptation report placeholder scan
  no_private_paths:
    severity: blocker
    pass: outputs contain no local absolute source paths
    evidence: private path scan
  no_secrets:
    severity: blocker
    pass: outputs contain no tokens, credentials, private prompts, or raw logs
    evidence: secret scan
  skipped_entries_explained:
    severity: required
    pass: every skipped entry has a reason in ADAPTATION_REPORT.md
    evidence: skipped section in adaptation report
  adapter_semantic_drift_check:
    severity: blocker
    pass: Cursor, Claude, and Codex outputs preserve the same purpose, gates, anti-patterns, and evidence requirements
    evidence: adapter output-layout review
  commands_from_target_project_only:
    severity: blocker
    pass: stack commands come from project-profile.yaml, CI, or target repo docs
    evidence: checked target files and command list
  commands_must_be_profile_parameters:
    severity: blocker
    pass: command placeholders are supplied by the target project profile, not hard-coded
    evidence: project-profile.yaml command section
  no_stack_commands_in_universal:
    severity: blocker
    pass: universal skills contain no concrete stack commands
    evidence: universal skill scan
  evidence_is_not_approval:
    severity: blocker
    pass: evidence supports claims but does not self-approve completion
    evidence: review record
  no_xiigen_only_terms_as_requirements:
    severity: blocker
    pass: source-project names appear only as examples or forbidden requirements
    evidence: architecture template scan
  no_raw_training_artifacts:
    severity: blocker
    pass: training data, models, checkpoints, and experiment results are not published raw
    evidence: release gate scan
  no_private_settings_published:
    severity: blocker
    pass: local agent settings and permission files are used only as source material
    evidence: source coverage and output scan
  private_paths_removed:
    severity: blocker
    pass: local absolute source paths are removed or replaced with placeholders
    evidence: private path scan
  raw_generated_material_not_published:
    severity: blocker
    pass: generated docs and evidence bundles are not published raw
    evidence: release gate scan

